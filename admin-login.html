<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - PT Printwork Indonesia</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="site-icon.png?v=10">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=10">
    <link rel="shortcut icon" href="site-icon.png?v=10">
    <style>
        :root {
            --bg-deep: #0F1B33;
            --bg-portal: #1B2A4A;
            --accent: #98CA3F;
            --text-white: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.6);
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background effects */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(152, 202, 63, 0.1) 0%, transparent 70%);
            z-index: 0;
        }

        .portal-card {
            background: rgba(27, 42, 74, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(152, 202, 63, 0.2);
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            border-radius: 4px;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }

        .icon-wrap {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(152, 202, 63, 0.15) 0%, transparent 80%);
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .icon-wrap svg {
            color: var(--accent);
            filter: drop-shadow(0 0 8px rgba(152, 202, 63, 0.5));
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 35px;
            letter-spacing: 0.02em;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 18px 20px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            color: white;
            font-family: 'Inter', sans-serif;
            text-align: center;
            letter-spacing: 0.1em;
            font-size: 14px;
            transition: all 0.3s var(--ease);
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 15px rgba(152, 202, 63, 0.1);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.05em;
        }

        .access-btn {
            width: 100%;
            padding: 20px;
            background-color: var(--accent);
            color: #1B2A4A;
            border: none;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s var(--ease);
        }

        .access-btn:hover {
            background-color: #A9DC4D;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(152, 202, 63, 0.2);
        }

        .access-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #ff4757;
            font-size: 12px;
            margin-top: 15px;
            display: none;
            font-weight: 600;
        }

        .back-link {
            display: block;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <div class="portal-card">
        <div class="icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>

        <h1>Admin Portal</h1>
        <p>Secure dashboard for owners.</p>

        <div class="input-group">
            <input type="password" id="adminPassword" placeholder="PASSWORD" autocomplete="off">
            <div id="errorTip" class="error-msg">Akses ditolak. Silakan coba lagi.</div>
        </div>

        <button class="access-btn" onclick="validateAccess()">Access Identity</button>

        <a href="index.html" class="back-link">← Back to website</a>
    </div>

    <script>
        const input = document.getElementById('adminPassword');
        const error = document.getElementById('errorTip');

        function validateAccess() {
            const val = input.value;
            if (val === "Printwork123") {
                // Succes animation or direct redirect
                document.querySelector('.portal-card').style.opacity = '0';
                document.querySelector('.portal-card').style.transform = 'translateY(-20px)';
                document.querySelector('.portal-card').style.transition = 'all 0.5s cubic-bezier(0.19, 1, 0.22, 1)';

                setTimeout(() => {
                    window.location.href = "admin.html";
                }, 400);
            } else {
                error.style.display = 'block';
                input.style.borderColor = '#ff4757';
                input.value = '';
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 400);
            }
        }

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                validateAccess();
            }
        });

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
            .shake { animation: shake 0.3s var(--ease); }
        `;
        document.head.appendChild(style);
    </script>
</body>

</html>
